name: Fambly Tests

on:
  push:
    branches: [ main, feat/* ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: macos-latest

    steps:
    - uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app

    - name: Run Unit and UI Tests
      run: |
        xcodebuild test \
          -scheme Fambly \
          -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
          -enableCodeCoverage YES \
          | xcpretty
